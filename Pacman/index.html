<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>NEON_PACMAN — Menú</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-low": "#131313",
            "surface-container": "#1a1919",
            "surface-dim": "#0e0e0e",
            "surface-bright": "#2c2c2c",
            secondary: "#00e3fd",
            "secondary-container": "#006875",
            background: "#0e0e0e",
            "outline-variant": "#494847",
            outline: "#777575",
            "surface-container-highest": "#262626",
            primary: "#fffeac",
            surface: "#0e0e0e",
            "on-surface-variant": "#adaaaa",
            error: "#ff7351",
            "surface-variant": "#262626",
            "surface-container-high": "#201f1f",
            tertiary: "#ff6f7d",
            "on-surface": "#ffffff",
            "on-primary": "#626200",
          },
          borderRadius: { none: "0px", DEFAULT: "0px", lg: "0px", xl: "0px", full: "9999px" },
          fontFamily: {
            headline: ["Space Grotesk"],
            body: ["Manrope"],
            label: ["Space Grotesk"],
          },
        },
      },
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .glitch-style:hover {
      text-shadow: 2px 0 #00e3fd, -2px 0 #ff6f7d;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-body selection:bg-secondary selection:text-surface-dim min-h-screen">
  <main class="max-w-6xl mx-auto px-6 py-16 md:py-24" id="menu">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
      <div class="lg:col-span-7 flex flex-col items-start space-y-10">
        <div class="relative">
          <h2
            class="font-headline text-6xl md:text-8xl font-black text-primary leading-none tracking-tighter drop-shadow-[0_0_15px_rgba(255,254,172,0.5)] uppercase">
            NEON<br />PAC-MAN
          </h2>
          <div class="absolute -top-3 -right-3 w-3 h-3 bg-primary"></div>
          <div class="absolute -bottom-3 -left-3 w-3 h-3 bg-secondary"></div>
        </div>
        <p class="text-on-surface-variant text-sm max-w-md leading-relaxed">
          Come todos los puntos, evita a los fantasmas y entra en el ranking local. Pulsa el botón para abrir la
          pantalla de
          juego.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-lg">
          <a href="play.html"
            class="inline-flex items-center justify-center h-16 px-8 bg-primary text-on-primary font-headline font-black text-lg tracking-widest hover:shadow-[0_0_30px_rgba(255,254,172,0.45)] transition-all active:scale-[0.98]">
            INICIAR JUEGO
          </a>
          <a href="rankings.html"
            class="inline-flex items-center justify-center h-16 px-8 border border-secondary/50 text-secondary font-headline font-bold text-sm tracking-widest hover:bg-secondary/10 transition-all">
            <span class="material-symbols-outlined text-base mr-2">leaderboard</span>
            RANKINGS
          </a>
        </div>
        <div class="flex items-center gap-8 pt-6 border-t border-outline-variant/30 w-full max-w-lg">
          <div>
            <span class="font-label text-secondary text-[10px] tracking-[0.2em] uppercase block">Mejor marca
              (local)</span>
            <span id="menu-high-score" class="font-headline text-3xl font-bold text-white tabular-nums">0</span>
          </div>
          <div class="h-10 w-px bg-outline-variant/30"></div>
          <div>
            <span class="font-label text-secondary text-[10px] tracking-[0.2em] uppercase block">Estado</span>
            <span class="font-headline text-sm font-bold text-primary">EN MENÚ</span>
          </div>
        </div>
      </div>

      <div class="lg:col-span-5 relative group w-full">
        <div
          class="absolute -inset-2 bg-gradient-to-tr from-secondary to-primary opacity-15 blur-2xl group-hover:opacity-25 transition-opacity pointer-events-none">
        </div>
        <div class="relative bg-surface-container-high border border-white/5 p-1 shadow-2xl">
          <div class="relative w-full overflow-hidden bg-black aspect-[15/17] max-h-[min(70vh,520px)] mx-auto">
            <img
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnlfvKqAfA0DrbRBQZqgS0S3gDHNnR7HQelTqbgT4kUpzNKoC-xueAOsyL8RiC2xkSlaZxKD50IYuvL7tIRLr8GcECahO86XN_deDtcLgsBvB7bKP9pnYoHuOv5nIB5H2kJuwotynLiJprWUMwqZJYj7jGFTWNzbM221HhdipzX3jE1ZW0HLkDXtm_hzLgOyJ-2alhukmfZdTXqoFTk3dAYmqAng-LYpEsrdVoRYZaoygltMvmkY5mf5zLW-MLThN3XAyFwWH1dayF"
              width="420" height="476" alt="Vista previa del laberinto estilo neón"
              class="w-full h-full object-cover opacity-90" loading="eager" decoding="async" />
            <div
              class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent pointer-events-none">
            </div>
            <div
              class="absolute top-4 left-4 font-label text-[10px] text-secondary tracking-widest uppercase pointer-events-none">
              Vista previa · no es el juego en vivo
            </div>
          </div>
        </div>
        <div class="absolute -top-3 -right-3 w-10 h-10 border-t-2 border-r-2 border-secondary/60 pointer-events-none">
        </div>
        <div class="absolute -bottom-3 -left-3 w-10 h-10 border-b-2 border-l-2 border-primary/60 pointer-events-none">
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="tests/tests.js"></script>
</body>

</html>
