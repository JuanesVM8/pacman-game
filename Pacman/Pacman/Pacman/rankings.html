<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rankings — NEON_PACMAN</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#131313",
              "surface-container": "#1a1919",
              "surface-dim": "#0e0e0e",
              "surface-bright": "#2c2c2c",
              secondary: "#00e3fd",
              "secondary-container": "#006875",
              background: "#0e0e0e",
              "outline-variant": "#494847",
              outline: "#777575",
              "surface-container-highest": "#262626",
              primary: "#fffeac",
              surface: "#0e0e0e",
              "on-surface-variant": "#adaaaa",
              tertiary: "#ff6f7d",
              "on-surface": "#ffffff",
              "surface-container-high": "#201f1f",
              "on-primary": "#626200",
            },
            borderRadius: { DEFAULT: "0rem", lg: "0rem", xl: "0rem", full: "9999px" },
            fontFamily: {
              headline: ["Space Grotesk"],
              body: ["Manrope"],
              label: ["Space Grotesk"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 48;
      }
      .glitch-style:hover {
        text-shadow: 2px 0 #00e3fd, -2px 0 #ff084e;
      }
      .scanline {
        background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
          linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="dark bg-surface-dim font-body text-on-surface overflow-x-hidden">
    <div class="fixed inset-0 scanline z-50 pointer-events-none opacity-20"></div>
    <div class="flex pt-16 min-h-screen">

      <main class="flex-1 p-6 md:p-12 pb-32">
        <div class="max-w-5xl mx-auto">
          <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div class="space-y-2">
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-secondary"></span>
                <span class="font-label text-secondary text-sm tracking-[0.2em] uppercase">Competición global</span>
              </div>
              <h1 class="font-headline text-5xl md:text-7xl font-bold tracking-tighter text-on-surface uppercase">
                <span class="text-primary italic">TOP</span> JUGADORES
              </h1>
            </div>
            <a
              href="index.html"
              class="flex items-center gap-2 px-6 py-3 border border-outline-variant hover:border-secondary hover:text-secondary transition-all group font-label uppercase text-xs tracking-widest"
            >
              <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
              VOLVER AL MENU
            </a>
          </div>

          <div id="ranking-board-mount" class="w-full"></div>

          <div class="mt-16 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-surface-container-low p-8 border-t-2 border-secondary/30 relative overflow-hidden group">
              <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <span class="material-symbols-outlined text-6xl text-secondary">public</span>
              </div>
              <div class="font-label text-xs text-secondary tracking-widest uppercase mb-4">Entradas del leaderboard</div>
              <div id="stat-hunters" class="font-headline text-4xl font-black">0</div>
              <div class="mt-4 text-outline text-sm">Almacenadas en este navegador</div>
            </div>
            <div class="bg-surface-container-low p-8 border-t-2 border-primary/30 relative overflow-hidden group">
              <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <span class="material-symbols-outlined text-6xl text-primary">mist</span>
              </div>
              <div class="font-label text-xs text-primary tracking-widest uppercase mb-4">Puntos (estimados)</div>
              <div id="stat-pellets" class="font-headline text-4xl font-black">0</div>
              <div class="mt-4 text-outline text-sm">Suma de la puntuación dividida por 10</div>
            </div>
            <div class="bg-surface-container-low p-8 border-t-2 border-tertiary/30 relative overflow-hidden group">
              <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <span class="material-symbols-outlined text-6xl text-tertiary">bolt</span>
              </div>
              <div class="font-label text-xs text-tertiary tracking-widest uppercase mb-4">Actual n.º1</div>
              <div id="stat-top-name" class="font-headline text-2xl font-black truncate">—</div>
              <div class="mt-4 text-outline text-sm">De las puntuaciones más altas</div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="fixed top-0 right-0 w-64 h-64 bg-secondary/5 blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-0 left-0 w-96 h-96 bg-primary/5 blur-[120px] pointer-events-none"></div>

    <script type="module" src="js/rankings-page.js"></script>
  </body>
</html>
