<!DOCTYPE html>
<html class="dark" lang="en" data-autostart-game="true">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON_PACMAN — Juego</title>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      alert("Error: " + msg + "\nLine: " + line + "\nCol: " + col + "\nStack: " + (error ? error.stack : ""));
    };
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary-fixed-dim": "#ff7985",
            "secondary-fixed-dim": "#00d7f0",
            "primary-fixed": "#f3f300",
            "on-error": "#450900",
            "surface-container-low": "#131313",
            "surface-container": "#1a1919",
            "on-tertiary": "#49000f",
            "on-secondary": "#004d57",
            "surface-dim": "#0e0e0e",
            "surface-bright": "#2c2c2c",
            "on-secondary-container": "#e8fbff",
            "on-primary-fixed-variant": "#646400",
            "tertiary-dim": "#e80045",
            "on-primary-container": "#5a5a00",
            secondary: "#00e3fd",
            "on-secondary-fixed": "#003a42",
            "inverse-primary": "#626200",
            "secondary-fixed": "#26e6ff",
            "on-secondary-fixed-variant": "#005964",
            "secondary-container": "#006875",
            background: "#0e0e0e",
            "inverse-surface": "#fcf8f8",
            "primary-fixed-dim": "#e4e400",
            "outline-variant": "#494847",
            outline: "#777575",
            "error-container": "#b92902",
            "on-tertiary-fixed": "#39000a",
            "tertiary-fixed": "#ff9198",
            "on-tertiary-container": "#000000",
            "tertiary-container": "#ff084e",
            "on-error-container": "#ffd2c8",
            "surface-container-highest": "#262626",
            "primary-container": "#f3f300",
            "primary-dim": "#f0f000",
            "on-primary-fixed": "#474700",
            "on-primary": "#626200",
            primary: "#fffeac",
            surface: "#0e0e0e",
            "on-background": "#ffffff",
            "on-surface-variant": "#adaaaa",
            error: "#ff7351",
            "error-dim": "#d53d18",
            "inverse-on-surface": "#565554",
            "surface-variant": "#262626",
            "surface-tint": "#fffeac",
            "surface-container-high": "#201f1f",
            tertiary: "#ff6f7d",
            "on-tertiary-fixed-variant": "#78001f",
            "on-surface": "#ffffff",
            "secondary-dim": "#00d4ec",
            "surface-container-lowest": "#000000",
          },
          borderRadius: { DEFAULT: "0px", lg: "0px", xl: "0px", full: "9999px" },
          fontFamily: {
            headline: ["Space Grotesk"],
            body: ["Manrope"],
            label: ["Space Grotesk"],
          },
        },
      },
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .glitch-style:hover {
      text-shadow: 2px 0 #00e3fd, -2px 0 #ff7351;
    }

    .maze-grid {
      background-image: radial-gradient(#1a1919 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .neon-border-glow {
      box-shadow: 0 0 15px rgba(0, 227, 253, 0.2), inset 0 0 15px rgba(0, 227, 253, 0.1);
    }

    .pacman-icon {
      clip-path: polygon(100% 0%, 100% 35%, 50% 50%, 100% 65%, 100% 100%, 0% 100%, 0% 0%);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .animate-blink {
      animation: blink 0.8s infinite;
    }
  </style>
</head>

<body
  class="bg-surface-dim text-on-background font-body selection:bg-secondary selection:text-surface-dim overflow-x-hidden">

  <div class="flex h-[calc(100vh-64px)] overflow-hidden">

    <main class="flex-1 relative bg-surface-dim overflow-y-auto p-4 md:p-6 xl:p-8 flex flex-col xl:flex-row gap-5">
      <!-- Left: HUD -->
      <div class="w-full xl:w-64 space-y-5 shrink-0">
        <div class="bg-surface-container-low p-6 border-l-4 border-primary shadow-lg">
          <div class="flex justify-between items-start mb-2">
            <span class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant uppercase">Puntuación más
              alta</span>
            <span id="high-score" class="font-label text-[10px] text-primary tabular-nums">0</span>
          </div>
          <div class="flex justify-between items-end">
            <div>
              <span
                class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant block mb-1 uppercase">PUNTUACION
                DE LA PARTIDA</span>
              <div id="score" class="font-headline text-4xl font-black text-primary tracking-tighter tabular-nums">0
              </div>
            </div>
          </div>
          <p class="mt-3 font-label text-[10px] text-secondary uppercase tracking-widest">
            Estado: <span id="state" class="text-primary">—</span>
          </p>
        </div>

        <div class="bg-surface-container-low p-6">
          <span class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant block mb-4 uppercase">Vidas
            restantes</span>
          <div id="lives-display" class="flex gap-4">
          </div>
        </div>

        <div class="bg-surface-container-lowest border border-outline-variant/20 p-6 hidden xl:block">
          <span class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant block mb-6">CONTROLES</span>
          <div class="space-y-4">
            <div class="flex items-center justify-between">
              <span class="text-xs font-headline text-on-surface-variant uppercase">Movimiento</span>
              <div class="flex flex-wrap gap-1 justify-end max-w-[10rem]">
                <span class="px-2 py-1 bg-primary text-on-primary text-[10px] font-headline font-bold">↑</span>
                <span
                  class="px-2 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-on-surface">←</span>
                <span
                  class="px-2 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-on-surface">↓</span>
                <span
                  class="px-2 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-on-surface">→</span>
                <span
                  class="px-2 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-on-surface">W</span>
                <span
                  class="px-2 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-on-surface">A</span>
                <span
                  class="px-2 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-on-surface">S</span>
                <span
                  class="px-2 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-on-surface">D</span>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs font-headline text-on-surface-variant uppercase">Pausa</span>
              <span
                class="px-3 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-primary">Esc</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs font-headline text-on-surface-variant uppercase">Reiniciar</span>
              <span
                class="px-3 py-1 bg-surface-container-high border border-outline/30 text-[10px] font-headline text-primary">R</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Center: canvas -->
      <div class="flex-1 flex flex-col items-center justify-center min-w-0">
        <div
          class="relative w-full max-w-5xl aspect-[15/17] bg-[#000000] border-4 border-secondary/20 neon-border-glow overflow-hidden p-2 md:p-4 xl:p-5 flex flex-col">
          <div class="relative w-full h-full maze-grid rounded flex items-center justify-center bg-black">
            <canvas id="game" class="max-w-full max-h-full w-full h-full object-contain"
              aria-label="Tablero de juego"></canvas>
            <div id="game-ready-overlay"
              class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none">
              <span
                class="font-headline font-black text-3xl text-primary tracking-[0.3em] italic animate-blink">READY!</span>
            </div>
          </div>
        </div>
        <div class="mt-8 flex flex-wrap gap-4 justify-center">
          <a href="index.html"
            class="px-8 py-3 bg-surface-container-highest text-on-surface font-headline font-bold text-xs border border-outline/30 hover:bg-surface-bright transition-all flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">home</span>
            MENÚ
          </a>
          <button type="button"
            class="px-8 py-3 bg-secondary text-on-secondary font-headline font-black text-xs hover:shadow-[0_0_20px_rgba(0,227,253,0.4)] transition-all flex items-center gap-2"
            data-action="start-game">
            <span class="material-symbols-outlined text-sm">bolt</span>
            REINICIAR PARTIDA
          </button>
        </div>
      </div>

      <!-- Right: summary -->
      <div class="w-full xl:w-64 space-y-5 shrink-0">
        <div class="flex justify-between items-center mb-4">
          <span id="level-display-text" class="font-label text-[10px] tracking-[0.2em] text-secondary uppercase">Nivel
            01</span>
          <span class="font-label text-[10px] text-on-surface-variant">ETAPA FUEGO</span>
        </div>
        <div class="bg-surface-container-low p-6">
          <div id="level-fires-container" class="flex items-center justify-center gap-4 overflow-hidden">
            <span class="level-fire material-symbols-outlined text-error text-3xl"
              style="font-variation-settings: 'FILL' 1">local_fire_department</span>
            <span class="level-fire material-symbols-outlined text-primary text-3xl opacity-20"
              style="font-variation-settings: 'FILL' 1">local_fire_department</span>
            <span class="level-fire material-symbols-outlined text-primary text-3xl opacity-20"
              style="font-variation-settings: 'FILL' 1">local_fire_department</span>
          </div>
        </div>
        <div class="bg-surface-container-low p-6">
          <span class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant block mb-4">POWER-UPS</span>
          <div class="grid grid-cols-4 gap-2">
            <div
              class="aspect-square bg-surface-container-high flex items-center justify-center border border-error/40">
              <span class="material-symbols-outlined text-error text-lg"
                style="font-variation-settings: 'FILL' 1">nutrition</span>
            </div>
            <div
              class="aspect-square bg-surface-container-high flex items-center justify-center border border-outline-variant/30 opacity-20">
              <span class="material-symbols-outlined text-on-surface-variant text-lg">nutrition</span>
            </div>
            <div
              class="aspect-square bg-surface-container-high flex items-center justify-center border border-outline-variant/30 opacity-20">
              <span class="material-symbols-outlined text-on-surface-variant text-lg">nutrition</span>
            </div>
            <div
              class="aspect-square bg-surface-container-high flex items-center justify-center border border-outline-variant/30 opacity-20">
              <span class="material-symbols-outlined text-on-surface-variant text-lg">nutrition</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <form id="name-form" hidden
    class="fixed bottom-24 md:bottom-8 left-1/2 z-[60] w-[min(92vw,24rem)] -translate-x-1/2 border border-secondary/40 bg-surface-container-high/95 p-4 shadow-2xl backdrop-blur-md">
    <label class="block font-label text-xs text-secondary tracking-widest uppercase mb-2">Guardar puntuación</label>
    <div class="flex flex-col gap-2 sm:flex-row sm:items-end">
      <input type="text" id="player-name" maxlength="12" autocomplete="off" placeholder="Nombre"
        class="flex-1 border border-white/10 bg-black/40 px-3 py-2 text-sm text-white placeholder:text-on-surface-variant focus:border-secondary focus:outline-none" />
      <button type="submit"
        class="bg-secondary text-on-secondary-fixed-variant font-headline font-bold text-sm tracking-widest px-4 py-2 hover:opacity-90">GUARDAR</button>
    </div>
  </form>

  <div class="fixed top-0 right-0 w-64 h-64 bg-secondary/5 blur-[100px] pointer-events-none"></div>
  <div class="fixed bottom-0 left-0 w-96 h-96 bg-primary/5 blur-[120px] pointer-events-none"></div>

  <div id="pause-overlay"
    class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div
      class="bg-surface-container-high/95 border border-secondary/40 p-8 shadow-2xl flex flex-col items-center gap-6 min-w-[300px]">
      <h2 class="font-headline font-black text-3xl text-primary tracking-widest uppercase mb-4 glitch-style">PAUSA</h2>

      <button id="btn-resume"
        class="w-full px-8 py-3 bg-surface-container-highest text-on-surface font-headline font-bold text-xs border border-outline/30 hover:bg-surface-bright transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-sm">play_arrow</span>
        REANUDAR
      </button>

      <button id="btn-mute"
        class="w-full px-8 py-3 bg-surface-container-highest text-on-surface font-headline font-bold text-xs border border-outline/30 hover:bg-surface-bright transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-sm" id="mute-icon">volume_up</span>
        <span id="mute-text">SONIDO: ON</span>
      </button>

      <button id="btn-exit"
        class="w-full px-8 py-3 bg-secondary text-on-secondary font-headline font-black text-xs hover:shadow-[0_0_20px_rgba(0,227,253,0.4)] transition-all flex items-center justify-center gap-2 mt-2">
        <span class="material-symbols-outlined text-sm">logout</span>
        SALIR
      </button>
    </div>
  </div>

  <script type="module" src="js/Game.js"></script>
</body>

</html>
